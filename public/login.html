<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ResumePortal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root { --ink:#0a0a0f; --paper:#f5f3ee; --accent:#e84545; --gold:#c9a84c; --muted:#6b6b78; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--ink); color:var(--paper); font-family:'DM Sans',sans-serif; min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }

  .left { background:var(--accent); padding:4rem; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; }
  .left::after { content:''; position:absolute; bottom:-80px; right:-80px; width:300px; height:300px; background:rgba(0,0,0,0.15); border-radius:50%; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; color:white; }
  .left-content { position:relative; z-index:1; }
  .left-content h2 { font-family:'Syne',sans-serif; font-size:2.8rem; font-weight:800; line-height:1.1; letter-spacing:-1px; color:white; margin-bottom:1rem; }
  .left-content p { color:rgba(255,255,255,0.8); font-size:1rem; line-height:1.6; }
  .role-pills { display:flex; gap:0.8rem; margin-top:2rem; }
  .pill { background:rgba(255,255,255,0.2); color:white; padding:0.5rem 1.2rem; border-radius:100px; font-size:0.85rem; font-weight:500; }

  .right { padding:4rem; display:flex; flex-direction:column; justify-content:center; }
  .form-header { margin-bottom:2.5rem; }
  .form-header h1 { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; letter-spacing:-0.5px; margin-bottom:0.5rem; }
  .form-header p { color:var(--muted); font-size:0.95rem; }
  .form-header a { color:var(--accent); text-decoration:none; font-weight:500; }

  .role-toggle { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; background:rgba(255,255,255,0.05); border-radius:10px; padding:4px; margin-bottom:2rem; }
  .role-btn { padding:0.7rem; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; transition:all 0.2s; background:transparent; color:var(--muted); }
  .role-btn.active { background:var(--accent); color:white; }

  .form-group { margin-bottom:1.2rem; }
  label { display:block; font-size:0.82rem; font-weight:500; color:var(--muted); margin-bottom:0.5rem; letter-spacing:0.5px; text-transform:uppercase; }
  input { width:100%; padding:0.85rem 1rem; background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1); border-radius:8px; color:var(--paper); font-family:'DM Sans',sans-serif; font-size:0.95rem; transition:border-color 0.2s; }
  input:focus { outline:none; border-color:var(--accent); }
  input::placeholder { color:rgba(255,255,255,0.25); }

  .submit-btn { width:100%; padding:1rem; background:var(--accent); color:white; border:none; border-radius:8px; font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; letter-spacing:0.3px; }
  .submit-btn:hover { background:#c73333; transform:translateY(-1px); }
  .submit-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

  .msg { padding:0.8rem 1rem; border-radius:8px; font-size:0.9rem; margin-top:1rem; display:none; }
  .msg.error { background:rgba(232,69,69,0.15); border:1px solid rgba(232,69,69,0.3); color:#ff8080; }
  .msg.success { background:rgba(72,199,142,0.15); border:1px solid rgba(72,199,142,0.3); color:#48c78e; }

  @media(max-width:768px) {
    body { grid-template-columns:1fr; }
    .left { display:none; }
    .right { padding:2rem; }
  }
</style>
</head>
<body>

<div class="left">
  <div class="logo">ResumePortal</div>
  <div class="left-content">
    <h2>Welcome Back 👋</h2>
    <p>Login to access your dashboard and manage your profile.</p>
    <div class="role-pills">
      <span class="pill">🎓 Students</span>
      <span class="pill">🏢 Recruiters</span>
    </div>
  </div>
  <div></div>
</div>

<div class="right">
  <div class="form-header">
    <h1>Login</h1>
    <p>Don't have an account? <a href="/register">Register here</a></p>
  </div>

  <div class="role-toggle">
    <button class="role-btn active" id="btn-student" onclick="setRole('student')">🎓 Student</button>
    <button class="role-btn" id="btn-recruiter" onclick="setRole('recruiter')">🏢 Recruiter</button>
  </div>

  <form id="loginForm">
    <input type="hidden" id="role" value="student">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Login →</button>
    <div class="msg" id="msg"></div>
  </form>

  <p style="text-align:center;margin-top:1.5rem;"><a href="/" style="color:var(--muted);font-size:0.85rem;text-decoration:none;">← Back to Home</a></p>
</div>

<script>
  function setRole(role) {
    document.getElementById('role').value = role;
    document.getElementById('btn-student').classList.toggle('active', role === 'student');
    document.getElementById('btn-recruiter').classList.toggle('active', role === 'recruiter');
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    msg.style.display = 'none';

    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      })
    });
    const data = await res.json();
    if (data.success) {
      msg.className = 'msg success';
      msg.textContent = '✓ Login successful! Redirecting...';
      msg.style.display = 'block';
      setTimeout(() => window.location.href = data.redirect, 800);
    } else {
      msg.className = 'msg error';
      msg.textContent = '✗ ' + data.message;
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Login →';
    }
  });
</script>
</body>
</html>
